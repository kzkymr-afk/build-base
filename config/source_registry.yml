storage:
  strategy: local_lake_then_duckdb
  raw_dir: data/raw
  staging_dir: data/staging
  mart_dir: data/marts
  generated_outputs_dir: data/final
  canonical_note: "data/final は成果物。長期保管・横断分析の正本は raw/staging/marts 側に置く。"

sources:
  - id: edinet_annual_securities_report
    name: 有価証券報告書
    enabled: true
    status: active
    acquisition_mode: edinet_api
    cadence: annual
    canonical_store: data/marts/edinet_annual
    raw_store: data/raw/documents
    key_columns:
      - company_year_id
      - field_id
      - source_doc_id

  - id: edinet_quarterly_disclosures
    name: 四半期・半期等のEDINET開示
    enabled: false
    status: planned
    acquisition_mode: edinet_api
    cadence: quarterly_or_semiannual
    canonical_store: data/marts/edinet_quarterly
    raw_store: data/raw/quarterly_documents
    note: "現行の有報抽出とは別スキーマで受け、年度有報と混ぜない。"

  - id: stock_price_monthly
    name: 株価月次データ
    enabled: true
    status: active
    acquisition_mode: yahoo_finance_chart
    cadence: monthly
    canonical_store: data/marts/market/stock_price_monthly.csv
    raw_store: data/raw/market/yahoo_chart
    key_columns:
      - listed_company_id
      - date
    note: "月末ベースのOHLC・調整後終値・出来高を保存する。時価総額は発行済株式数ソース追加後に計算する。"

  - id: mlit_construction_statistics
    name: 国土交通省統計
    enabled: false
    status: planned
    acquisition_mode: manual_or_scripted_download
    cadence: monthly_or_annual
    canonical_store: data/marts/mlit_statistics
    raw_store: data/raw/mlit_statistics
    note: "指定統計ごとに表定義・単位・更新周期を別管理する。"

  - id: company_factbooks
    name: ゼネコン各社ファクトブック
    enabled: true
    status: pilot
    acquisition_mode: configured_url_fetch
    cadence: annual
    canonical_store: data/marts/company_factbooks/building_orders_by_category.csv
    raw_store: data/raw/factbooks
    key_columns:
      - company_id
      - fiscal_year
      - source_dataset_id
      - source_metric_id
      - category_type
      - use_category_raw
    note: "鹿島・清水・大林組のパイロット。PDF/Excel/HTML/IRPocket JSONが混在する前提で、会社・年度・ページ/シート単位の証跡を保持する。"

  - id: obsidian_manual_technicians
    name: ゼネコン各社の技術者数 Obsidian手整理ノート
    enabled: true
    status: active
    acquisition_mode: obsidian_markdown_table
    cadence: annual_manual_update
    canonical_store: data/marts/manual_technicians/architecture_engineers_long.csv
    raw_store: ../../Obsidian/Kzky-works/ゼネコン各社の技術者数.md
    key_columns:
      - company_year_id
      - field_id
    note: "CIIC経営事項審査結果通知の建築一式 技術職員数を、手整理済みObsidianノートから取り込む。ノートの年はfiscal_year_end年としてcompany_year_masterへ突合する。"

  - id: peer_excel
    name: 同業他社情報Excel
    enabled: false
    status: planned
    acquisition_mode: user_supplied_excel
    cadence: ad_hoc
    canonical_store: data/marts/peer_excel
    raw_store: data/raw/user_supplied/peer_excel
    note: "ユーザー提供Excelは原本をrawに保存し、取り込み後の列定義をstagingで固定する。"
