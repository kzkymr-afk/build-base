document_source_defaults:
  enabled: true
  parser: link_index
  parse_documents: true
  follow_links: true
  max_follow_links: 10
  source_doc_type: factbook_or_ir_data
  source_metric_id: building_use_metrics
  target_metric_ids:
    - building_orders_by_use
    - completed_building_by_use
  category_type: use
  scope: mixed
  business_scope: building
  link_text_includes:
    - ファクト
    - FACT
    - Fact
    - ＦＡＣＴ
    - データブック
    - データ
    - 建築
    - 用途別
    - 用途
    - 受注
    - 完工
    - 完成工事
    - 完成高
    - 決算説明
    - 決算補足
    - 決算参考
    - 補足資料
    - 決算資料
  href_includes:
    - .pdf
    - .xls
    - .xlsx
    - .csv
    - .zip
  follow_link_text_includes:
    - ファクト
    - FACT
    - Fact
    - ＦＡＣＴ
    - データブック
    - データ
    - 決算説明
    - 決算補足
    - 決算参考
    - 決算資料
    - IRライブラ
    - IR資料
    - 決算関連
  follow_href_includes:
    - fact
    - data
    - databook
    - library
    - ir
    - presentation
    - results
    - summary
    - archives
    - documents
    - investor
  note: "建築の用途別受注高・用途別完工高を最優先ターゲットにした公式資料候補。非開示企業もあるため、候補有無と未解析状態を分けて管理する。PDF/旧xlsは資料候補として保存し、構造化パーサ追加後に値抽出する。"

