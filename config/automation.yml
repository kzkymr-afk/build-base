annual_refresh:
  enabled: true
  default_fiscal_year_end_month: 3
  filing_windows:
    - name: march_end_annual
      fiscal_year_end_month: 3
      start_month_day: "06-01"
      end_month_day: "08-15"
  review_gate:
    enabled: true
    max_active_review_items: 0
    max_saved_unapplied_reviews: 0
    require_final_outputs: true
    require_algorithm_audit: true
    algorithm_audit_max_age_days: 14
    require_regression_pass: true
    regression_max_age_days: 14
  schedule:
    engine: launchd
    intended_frequency: daily_during_window
    first_check_month_day: "06-20"
    rerun_until_month_day: "08-15"
    local_time: "07:30"
    note: "レビュー未完了なら annual-refresh は停止し、EDINET取得へ進まない。"

roll_forward:
  enabled: true
  copy_latest_company_year_per_company: true
  reset_transition_year_flag: true
  clear_event_fields: true
  manual_check_required_fields:
    - reporting_entity_id
    - parent_group_id_at_year_end
    - current_parent_group_id
    - ownership_status
    - listing_status
    - data_scope_allowed
    - analysis_treatment

stock_price_monthly:
  enabled: true
  provider: yahoo_finance_chart
  cadence: monthly
  run_day_of_month: 5
  include_current_month: false
  initial_start_date: "2015-01-01"
  request_timeout_seconds: 30
  retry_count: 2
  retry_backoff_seconds: 2
  polite_sleep_seconds: 0.25
  scheduler_check_interval_seconds: 21600
  user_agent: "Mozilla/5.0 BuildBase/stock-monthly"
  canonical_store: data/marts/market/stock_price_monthly.csv
  raw_store: data/raw/market/yahoo_chart
  note: "Webアプリ起動中に毎月チェックし、前月末までの月次OHLC・調整後終値・出来高を取得する。"

company_factbooks:
  enabled: true
  cadence: annual_or_quarterly
  canonical_store: data/marts/company_factbooks/building_orders_by_category.csv
  source_document_store: data/marts/company_factbooks/source_documents.csv
  raw_store: data/raw/company_factbooks
  request_timeout_seconds: 30
  retry_count: 2
  retry_backoff_seconds: 2
  polite_sleep_seconds: 0.25
  note: "鹿島・清水・大林組のパイロット。公式ファクトブック/データブック/決算参考資料から建築受注カテゴリを取得し、用途別は category_type=use として管理する。"
